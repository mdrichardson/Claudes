<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="256" height="256" rx="48" fill="#16213e"/>
  <!-- Three Claude sparkle shapes arranged as columns -->
  <!-- Left sparkle -->
  <g transform="translate(68, 108) scale(0.7)">
    <circle cx="0" cy="-32" r="9" fill="#e94560"/>
    <circle cx="0" cy="32" r="9" fill="#e94560"/>
    <circle cx="-28" cy="-16" r="9" fill="#e94560"/>
    <circle cx="28" cy="16" r="9" fill="#e94560"/>
    <circle cx="-28" cy="16" r="9" fill="#e94560"/>
    <circle cx="28" cy="-16" r="9" fill="#e94560"/>
    <circle cx="0" cy="0" r="14" fill="#e94560"/>
  </g>
  <!-- Center sparkle (larger, primary) -->
  <g transform="translate(128, 108) scale(1.0)">
    <circle cx="0" cy="-36" r="11" fill="url(#g1)"/>
    <circle cx="0" cy="36" r="11" fill="url(#g1)"/>
    <circle cx="-31" cy="-18" r="11" fill="url(#g1)"/>
    <circle cx="31" cy="18" r="11" fill="url(#g1)"/>
    <circle cx="-31" cy="18" r="11" fill="url(#g1)"/>
    <circle cx="31" cy="-18" r="11" fill="url(#g1)"/>
    <circle cx="0" cy="0" r="16" fill="url(#g1)"/>
  </g>
  <!-- Right sparkle -->
  <g transform="translate(188, 108) scale(0.7)">
    <circle cx="0" cy="-32" r="9" fill="#e94560"/>
    <circle cx="0" cy="32" r="9" fill="#e94560"/>
    <circle cx="-28" cy="-16" r="9" fill="#e94560"/>
    <circle cx="28" cy="16" r="9" fill="#e94560"/>
    <circle cx="-28" cy="16" r="9" fill="#e94560"/>
    <circle cx="28" cy="-16" r="9" fill="#e94560"/>
    <circle cx="0" cy="0" r="14" fill="#e94560"/>
  </g>
  <!-- "Claudes" text -->
  <text x="128" y="210" text-anchor="middle" font-family="Segoe UI, sans-serif" font-weight="700" font-size="30" fill="#e0e0e0" letter-spacing="2">CLAUDES</text>
</svg>
